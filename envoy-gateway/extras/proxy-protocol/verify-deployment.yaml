apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: whoami
spec:
  ports:
    - name: http
      targetPort: 80
      port: 80
  selector:
    app: whoami

---
apiVersion: networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami
spec:
  parentRefs:
    # reference the gateway resource name as defined in envoy-gateway/gateway.yaml
    # or change this to match your gateway name
    - name: example-gateway
  hostnames:
    - "whoami.example.com"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: whoami
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
